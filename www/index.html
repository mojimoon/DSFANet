<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IDS Offline Dashboard</title>
  <link rel="stylesheet" href="./style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <h1>IDS Dashboard</h1>
      <nav>
        <button class="navBtn active" data-view="overview">总览</button>
        <button class="navBtn" data-view="dataset">数据集分析</button>
        <button class="navBtn" data-view="benchmarks">模型/集成对比</button>
        <button class="navBtn" data-view="attacks">攻击结果对比</button>
        <button class="navBtn" data-view="model-detail">单模型详情</button>
        <button class="navBtn" data-view="sample-detail">单实例详情</button>
      </nav>
      <div id="metaInfo" class="meta"></div>
    </aside>

    <main class="content">
      <section id="view-overview" class="view active">
        <div class="grid">
          <section class="card">
            <h2>核心指标</h2>
            <div id="kpis" class="kpis"></div>
          </section>
          <section class="card">
            <h2>PR 曲线（主模型）</h2>
            <canvas id="prChart"></canvas>
          </section>
          <section class="card">
            <h2>告警分数分布</h2>
            <canvas id="histChart"></canvas>
          </section>
          <section class="card">
            <h2>概念漂移观察</h2>
            <canvas id="driftChart"></canvas>
          </section>
          <section class="card wide">
            <h2>SHAP Top Features (LSTM)</h2>
            <canvas id="shapChart"></canvas>
          </section>
        </div>
      </section>

      <section id="view-dataset" class="view">
        <div class="grid">
          <section class="card">
            <h2>类别分布（Train/Test）</h2>
            <canvas id="classChart"></canvas>
          </section>
          <section class="card wide">
            <h2>特征统计（高方差 Top）</h2>
            <div class="tableWrap">
              <table id="featureStatsTable"><thead></thead><tbody></tbody></table>
            </div>
          </section>
        </div>
      </section>

      <section id="view-benchmarks" class="view">
        <div class="grid">
          <section class="card">
            <h2>平均精度 AP 对比</h2>
            <canvas id="benchmarkChart"></canvas>
          </section>
          <section class="card wide">
            <h2>模型/集成指标表</h2>
            <div class="tableWrap">
              <table id="benchmarkTable"><thead></thead><tbody></tbody></table>
            </div>
          </section>
        </div>
      </section>

      <section id="view-attacks" class="view">
        <div class="grid">
          <section class="card">
            <h2>攻击下 AP 对比</h2>
            <canvas id="attackChart"></canvas>
          </section>
          <section class="card wide">
            <h2>攻击结果明细</h2>
            <div class="tableWrap">
              <table id="attackTable"><thead></thead><tbody></tbody></table>
            </div>
          </section>
        </div>
      </section>

      <section id="view-model-detail" class="view">
        <div class="grid">
          <section class="card wide controls">
            <label>模型：<select id="modelSelect"></select></label>
          </section>
          <section class="card">
            <h2>模型指标</h2>
            <div id="modelMetrics" class="kpis"></div>
          </section>
          <section class="card">
            <h2>模型 PR 曲线</h2>
            <canvas id="modelPrChart"></canvas>
          </section>
          <section class="card wide">
            <h2>模型关键特征</h2>
            <div class="tableWrap">
              <table id="modelFeatureTable"><thead></thead><tbody></tbody></table>
            </div>
          </section>
        </div>
      </section>

      <section id="view-sample-detail" class="view">
        <div class="grid">
          <section class="card wide controls">
            <label>样本 ID：<select id="sampleSelect"></select></label>
            <label>
              告警阈值: <span id="thresholdValue">0.50</span>
              <input id="thresholdSlider" type="range" min="0" max="1" step="0.01" value="0.5" />
            </label>
          </section>
          <section class="card wide">
            <h2>告警预览（按阈值过滤）</h2>
            <div class="tableWrap">
              <table id="alertsTable"><thead></thead><tbody></tbody></table>
            </div>
          </section>
          <section class="card">
            <h2>样本模型分数</h2>
            <canvas id="sampleScoreChart"></canvas>
          </section>
          <section class="card">
            <h2>样本关键信息</h2>
            <div id="sampleSummary"></div>
          </section>
          <section class="card wide">
            <h2>样本特征值</h2>
            <div class="tableWrap">
              <table id="sampleFeatureTable"><thead></thead><tbody></tbody></table>
            </div>
          </section>
        </div>
      </section>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
