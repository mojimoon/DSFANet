<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IDS Offline Dashboard</title>
  <link rel="stylesheet" href="./style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <header class="topbar">
    <h1>离线异常检测 Dashboard</h1>
    <div id="metaInfo" class="meta"></div>
  </header>

  <main class="grid">
    <section class="card">
      <h2>核心指标</h2>
      <div id="kpis" class="kpis"></div>
    </section>

    <section class="card">
      <h2>PR 曲线</h2>
      <canvas id="prChart"></canvas>
    </section>

    <section class="card">
      <h2>告警分数分布</h2>
      <canvas id="histChart"></canvas>
    </section>

    <section class="card">
      <h2>概念漂移观察</h2>
      <canvas id="driftChart"></canvas>
    </section>

    <section class="card wide">
      <h2>SHAP Top Features (LSTM)</h2>
      <canvas id="shapChart"></canvas>
    </section>

    <section class="card wide">
      <div class="alertsHeader">
        <h2>告警预览（可交互阈值）</h2>
        <label>
          阈值: <span id="thresholdValue">0.50</span>
          <input id="thresholdSlider" type="range" min="0" max="1" step="0.01" value="0.5" />
        </label>
      </div>
      <div class="tableWrap">
        <table id="alertsTable">
          <thead></thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
